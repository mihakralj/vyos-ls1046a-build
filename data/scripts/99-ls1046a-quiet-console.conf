# Quiet the kernel console on LS1046A AFTER userspace is up.
#
# Applied by systemd-sysctl.service (runs After=local-fs.target, before
# multi-user.target), so early boot (firmware, kernel init, driver probe,
# initramfs, root pivot) remains fully verbose on the serial console.
#
# The primary nuisance this suppresses is the NXP SDK fsl_dpa driver's
# pr_err spam — "phy device not initialized" — which repeats at T+62-64s
# and buries the login banner/prompt on ttyS0.
#
# printk format: console_loglevel default_message_loglevel min_console_loglevel default_console_loglevel
#   4 = KERN_WARNING — only WARN and above reach the console
#   4 = default log level for messages without an explicit level
#   1 = minimum loglevel that can ever be set on the console
#   7 = boot-time default (unused here, kept for completeness)
kernel.printk = 4 4 1 7