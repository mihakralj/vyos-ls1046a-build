name: VyOS LS1046A build

on:
  schedule:
    - cron: "0 5 * * *"

  workflow_dispatch:
    inputs:
      BUILD_BY:
        description: 'Builder identifier (auto: mihakralj@users.noreply.github.com)'
        default: ''
      build_version:
        description: 'Version number (auto: YYYY.MM.DD-HHMM-rolling)'
        default: ''
      builder_image:
        description: 'Builder Docker image'
        default: 'ghcr.io/huihuimoe/vyos-arm64-build/vyos-builder:current-arm64'

env:
  DEBIAN_MIRROR: http://deb.debian.org/debian/
  DEBIAN_SECURITY_MIRROR: http://deb.debian.org/debian-security
  # ~~no package on the official repo~~ fixed
  VYOS_MIRROR: https://packages.vyos.net/repositories/current/

jobs:
  build_iso:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    container:
      image: ${{ github.event.inputs.builder_image || 'ghcr.io/huihuimoe/vyos-arm64-build/vyos-builder:current-arm64' }}
      options: --sysctl net.ipv6.conf.lo.disable_ipv6=0 --privileged --user root
    defaults:
      run:
        shell: bash
    outputs:
      BUILD_BY: ${{ steps.set_env_variables.outputs.BUILD_BY }}
      build_version: ${{ steps.set_env_variables.outputs.build_version }}
      TIMESTAMP: ${{ steps.set_env_variables.outputs.TIMESTAMP }}
      PREVIOUS_SUCCESS_BUILD_TIMESTAMP: ${{ steps.set_env_variables.outputs.PREVIOUS_SUCCESS_BUILD_TIMESTAMP }}
      image_iso: ${{ steps.build_iso.outputs.image_iso }}
      image_name: ${{ steps.build_iso.outputs.image_name }}
      usb_img: ${{ steps.build_iso.outputs.usb_img }}

    steps:
      - name: Install Dependencies
        run: |
          source <(sed -n '/enable programmable completion/,$p' /etc/skel/.bashrc)
          set -ex
          echo "HOME: $HOME"
          echo "PATH: $PATH"
          command -v go
          command -v opam
          lscpu
          free -m
          # Install missing packages
          apt-get update -qq
          apt-get install -y \
            libsystemd-dev libglib2.0-dev libip4tc-dev libipset-dev libnfnetlink-dev \
            libnftnl-dev libnl-nf-3-dev libpopt-dev libpcap-dev libbpf-dev \
            bubblewrap git-lfs kpartx clang llvm cmake \
            protobuf-compiler python3-cracklib python3-protobuf \
            libreadline-dev liblua5.3-dev byacc flex \
            dosfstools mtools zstd u-boot-tools
          # python3-cracklib: https://github.com/vyos/vyos-build/commit/e846e68f9f6457865f3e3af92adfe42933555c59
          # protobuf-compiler: https://github.com/vyos/vyos-build/commit/0a6c197226400c4bbe210b435baaa716d4fb8377
          # python3-protobuf: https://github.com/vyos/vyos-build/commit/dd2c245be73c1e83b6ca392924aa549f77c5586e
          apt-get upgrade -y

      - uses: actions/checkout@v6
        with:
          lfs: true
      - name: "Initialization: set env variables"
        id: set_env_variables
        run: |
          source <(sed -n '/enable programmable completion/,$p' /etc/skel/.bashrc)
          set -ex
          if [ -n "${{ github.event.inputs.BUILD_BY }}" ]; then
            echo "BUILD_BY=${{ github.event.inputs.BUILD_BY }}" >> $GITHUB_ENV
            echo "BUILD_BY=${{ github.event.inputs.BUILD_BY }}" >> $GITHUB_OUTPUT
          else
            echo "BUILD_BY=${{ github.repository_owner_id }}+${{ github.repository_owner }}@users.noreply.github.com" >> $GITHUB_ENV
            echo "BUILD_BY=${{ github.repository_owner_id }}+${{ github.repository_owner }}@users.noreply.github.com" >> $GITHUB_OUTPUT
          fi
          if [ -z "${{ github.event.inputs.build_version }}" ]; then
            echo "build_version=$(date -u +%Y.%m.%d-%H%M)-rolling" >> $GITHUB_OUTPUT
          else
            echo "build_version=${{ github.event.inputs.build_version }}" >> $GITHUB_OUTPUT
          fi
          echo "TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "PREVIOUS_SUCCESS_BUILD_TIMESTAMP=$(cat version.json | jq -r '.[0].timestamp')" >> $GITHUB_OUTPUT

      - name: Checkout vyos-build repo
        uses: actions/checkout@v6
        with:
          repository: vyos/vyos-build
          path: vyos-build

      - name: Fix vyos-build
        env:
          MOK_KEY: ${{ secrets.MOK_KEY }}
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
        run: |
          [ -n "$MOK_KEY" ] && echo "$MOK_KEY" > data/mok/MOK.key
          [ -n "$MINISIGN_PRIVATE_KEY" ] && echo "$MINISIGN_PRIVATE_KEY" > data/vyos-ls1046a.minisign.key

          source <(sed -n '/enable programmable completion/,$p' /etc/skel/.bashrc)
          set -ex

          ### vyos-1x patches
          # IMPORTANT: build.py does `git checkout current` which reverts any direct
          # patches applied to the cloned repo. We use pre_build_hook to apply patches
          # AFTER checkout, before dpkg-buildpackage.
          VYOS1X_BUILD=vyos-build/scripts/package-build/vyos-1x
          PATCH_STAGING="$VYOS1X_BUILD/ls1046a-patches"
          mkdir -p "$PATCH_STAGING"
          cp data/vyos-1x-*.patch "$PATCH_STAGING/"
          cp data/scripts/patch-mmcblk-default.py "$PATCH_STAGING/"
          cp data/reftree.cache "$PATCH_STAGING/"
          cat > "$VYOS1X_BUILD/package.toml" <<'EOF'
          [[packages]]
          name = "vyos-1x"
          commit_id = "current"
          scm_url = "https://github.com/vyos/vyos-1x.git"
          pre_build_hook = """
            set -ex
            cp ../ls1046a-patches/reftree.cache data/reftree.cache
            sed -i 's/all: clean copyright/all: clean/' Makefile
            patch_fail=0
            for p in ../ls1046a-patches/vyos-1x-*.patch; do
              if ! patch --no-backup-if-mismatch -p1 < "$p"; then
                echo "WARNING: $(basename $p) failed to apply (continuing)"
                patch_fail=1
              fi
            done
            python3 ../ls1046a-patches/patch-mmcblk-default.py
            [ $patch_fail -eq 1 ] && echo "WARNING: some patches failed — check build output"
            true
          """
          EOF

          ### vyos-build patches
          cp data/config.boot.default vyos-build/data/live-build-config/includes.chroot/opt/vyatta/etc/
          cp data/config.boot.dhcp vyos-build/data/live-build-config/includes.chroot/opt/vyatta/etc/
          patch --no-backup-if-mismatch -p1 -d vyos-build < data/vyos-build-005-add_vim_link.patch
          patch --no-backup-if-mismatch -p1 -d vyos-build < data/vyos-build-007-no_sbsign.patch

          ### LS1046A kernel config (DPAA1/FMan networking, eMMC, serial, MTD/SPI for FMan firmware)
          DEFCONFIG=vyos-build/scripts/package-build/linux-kernel/config/arm64/vyos_defconfig
          # Remove upstream explicit disables that conflict with our overrides.
          # kconfig defconfig processing doesn't reliably let later entries win
          # when an earlier "# CONFIG_X is not set" is present.  Removing conflicting
          # lines before appending ensures our values stick after make vyos_defconfig.
          sed -i '/CONFIG_DEVTMPFS_MOUNT/d'          "$DEFCONFIG"
          sed -i '/CONFIG_CPU_FREQ_DEFAULT_GOV/d'     "$DEFCONFIG"
          sed -i '/CONFIG_STRICT_DEVMEM/d'            "$DEFCONFIG"
          sed -i '/CONFIG_IO_STRICT_DEVMEM/d'         "$DEFCONFIG"
          sed -i '/CONFIG_DEBUG_PREEMPT/d'             "$DEFCONFIG"
          printf '%s\n' \
            '# === LS1046A / NXP Layerscape DPAA1 (Mono Gateway DK) ===' \
            'CONFIG_DEVTMPFS_MOUNT=y' \
            'CONFIG_FSL_FMAN=y' \
            'CONFIG_FSL_DPAA=y' \
            'CONFIG_FSL_DPAA_ETH=y' \
            'CONFIG_FSL_DPAA_MACSEC=y' \
            'CONFIG_FSL_XGMAC_MDIO=y' \
            'CONFIG_PHY_FSL_LYNX_28G=y' \
            'CONFIG_FSL_BMAN=y' \
            'CONFIG_FSL_QMAN=y' \
            'CONFIG_FSL_PAMU=y' \
            'CONFIG_HWMON=y' \
            'CONFIG_MAXLINEAR_GPHY=y' \
            'CONFIG_MMC_SDHCI_OF_ESDHC=y' \
            'CONFIG_FSL_EDMA=y' \
            'CONFIG_SERIAL_OF_PLATFORM=y' \
            'CONFIG_MTD=y' \
            'CONFIG_MTD_SPI_NOR=y' \
            'CONFIG_SPI=y' \
            'CONFIG_SPI_FSL_DSPI=y' \
            'CONFIG_SPI_FSL_QSPI=y' \
            'CONFIG_SPI_FSL_QUADSPI=y' \
            'CONFIG_CDX_BUS=y' \
            '# CONFIG_DEBUG_PREEMPT is not set' \
            'CONFIG_QORIQ_CPUFREQ=y' \
            'CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y' \
            '# CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL is not set' \
            '# === SFP support (10G copper/fiber transceivers) ===' \
            'CONFIG_SFP=y' \
            'CONFIG_PHYLINK=y' \
            'CONFIG_PHY_FSL_LYNX_10G=y' \
            'CONFIG_I2C_MUX=y' \
            'CONFIG_I2C_MUX_PCA954x=y' \
            'CONFIG_AQUANTIA_PHY=y' \
            'CONFIG_REALTEK_PHY=y' \
            '# === I2C + GPIO controllers (required for SFP I2C mux and GPIOs) ===' \
            'CONFIG_I2C_IMX=y' \
            'CONFIG_GPIO_MPC8XXX=y' \
            '# === Board peripherals (fan, thermal, RTC, power sensors) ===' \
            'CONFIG_SENSORS_EMC2305=y' \
            'CONFIG_SENSORS_INA2XX=y' \
            'CONFIG_RTC_DRV_PCF2127=y' \
            '# === DPDK USDPAA support (userspace DPAA1 for 10G PMD) ===' \
            'CONFIG_FSL_USDPAA_MAINLINE=y' \
            '# === Disable STRICT_DEVMEM for DPDK DPAA PMD (fman_init mmaps /dev/mem) ===' \
            '# CONFIG_STRICT_DEVMEM is not set' \
            '# CONFIG_IO_STRICT_DEVMEM is not set' \
            '# === USB live boot support (built-in for initramfs FAT32 access) ===' \
            'CONFIG_USB_STORAGE=y' \
            'CONFIG_VFAT_FS=y' \
            'CONFIG_FAT_FS=y' \
            'CONFIG_NLS_CODEPAGE_437=y' \
            'CONFIG_NLS_ISO8859_1=y' \
            'CONFIG_NLS_UTF8=y' \
            >> "$DEFCONFIG"

          ### USDPAA kernel patches: BMan/QMan exports + /dev/fsl-usdpaa chardev
          # Single combined patch: exports BMan/QMan symbols, adds portal
          # reservation, and adds Kconfig/Makefile for fsl_usdpaa_mainline.
          # fsl_usdpaa_mainline.c is copied separately (1453 lines, too large
          # for a unified diff). DTS reserved-memory is in mono-gateway-dk.dts.
          KERNEL_BUILD=vyos-build/scripts/package-build/linux-kernel
          KERNEL_PATCHES="$KERNEL_BUILD/patches/kernel"
          mkdir -p "$KERNEL_PATCHES"
          cp data/kernel-patches/4002-hwmon-ina2xx-add-INA234-support.patch "$KERNEL_PATCHES/"
          cp data/kernel-patches/4003-sfp-rollball-phylink-einval-fallback.patch "$KERNEL_PATCHES/"
          cp data/kernel-patches/9001-usdpaa-bman-qman-exports-and-driver.patch "$KERNEL_PATCHES/"
          # Stage the USDPAA source file for copy into kernel tree during build.
          # build-kernel.sh applies patches from patches/kernel/ then runs make.
          # We inject a cp command after the patch loop to place the .c file.
          cp data/kernel-patches/fsl_usdpaa_mainline.c "$KERNEL_BUILD/"
          cp data/kernel-patches/patch-phylink.py "$KERNEL_BUILD/"
          # Inject .c file copy before "# Change name of Signing Cert" in build-kernel.sh.
          awk '/# Change name of Signing Cert/ {
            print "# Copy USDPAA mainline driver source (too large for unified diff)"
            print "if [ -f \"${CWD}/fsl_usdpaa_mainline.c\" ]; then"
            print "  echo \"I: Copy fsl_usdpaa_mainline.c to drivers/soc/fsl/qbman/\""
            print "  cp \"${CWD}/fsl_usdpaa_mainline.c\" drivers/soc/fsl/qbman/fsl_usdpaa_mainline.c"
            print "fi"
            print ""
            print "# Patch phylink: trust SFP link over PCS in INBAND mode (LS1046A XFI regression)"
            print "PHYLINK_C=$(find . -path \"*/net/phylink.c\" -maxdepth 4 | head -1)"
            print "if [ -n \"$PHYLINK_C\" ] && [ -f \"${CWD}/patch-phylink.py\" ]; then"
            print "  python3 \"${CWD}/patch-phylink.py\" \"$PHYLINK_C\""
            print "fi"
          } { print }' "$KERNEL_BUILD/build-kernel.sh" > /tmp/build-kernel-patched.sh
          mv /tmp/build-kernel-patched.sh "$KERNEL_BUILD/build-kernel.sh"
          chmod +x "$KERNEL_BUILD/build-kernel.sh"

          ### Remove --uefi-secure-boot from grub-install
          # U-Boot boots via booti (not bootefi) so no EFI runtime is present.
          # grub-install --uefi-secure-boot calls efibootmgr which fails with exit 1
          # when /sys/firmware/efi does not exist. GRUB files install fine without it.
          find "$VYOS1X" -name '*.py' -exec \
            grep -l 'uefi.secure.boot' {} \; | \
            xargs -r sed -i "s/'--uefi-secure-boot'[,]\?//g" 2>/dev/null || true

          ### LS1046A console: revert ttyAMA0 -> ttyS0 (8250 UART at 0x21c0500)
          sed -i 's/ttyAMA0/ttyS0/g' \
            vyos-build/data/live-build-config/hooks/live/01-live-serial.binary \
            vyos-build/data/live-build-config/includes.chroot/opt/vyatta/etc/grub/default-union-grub-entry \
            2>/dev/null || true

          ### MOK certificate for kernel module signing
          if [ -f data/mok/MOK.key ]; then
            cp data/mok/MOK.key vyos-build/data/certificates/vyos-dev-2025-linux.key
            cp data/mok/MOK.pem vyos-build/data/certificates/vyos-dev-2025-linux.pem
          fi

          ### Minisign public key + DTB for ISO
          cp data/vyos-ls1046a.minisign.pub vyos-build/data/live-build-config/includes.chroot/usr/share/vyos/keys/
          mkdir -p vyos-build/data/live-build-config/includes.binary
          cp data/dtb/mono-gw.dtb vyos-build/data/live-build-config/includes.binary/mono-gw.dtb

          ### DTB inside squashfs: install_image() copies all files from /boot/
          # By placing the DTB at /boot/mono-gw.dtb inside the squashfs, VyOS's
          # install_image() automatically copies it to the target boot directory.
          # This requires ZERO changes to upstream image_installer.py.
          CHROOT=vyos-build/data/live-build-config/includes.chroot
          mkdir -p "$CHROOT/boot"
          cp data/dtb/mono-gw.dtb "$CHROOT/boot/mono-gw.dtb"

          ### U-Boot tools: fw_setenv config for updating boot env from Linux
          cp data/scripts/fw_env.config "$CHROOT/etc/fw_env.config"

          ### Post-install helper: writes /boot/vyos.env + one-time U-Boot env setup
          mkdir -p "$CHROOT/usr/local/bin"
          cp data/scripts/vyos-postinstall "$CHROOT/usr/local/bin/vyos-postinstall"
          chmod +x "$CHROOT/usr/local/bin/vyos-postinstall"

          ### Safety net: run vyos-postinstall on every boot to sync vyos.env
          # Ensures /boot/vyos.env matches the running image even if the
          # image_installer.py hook (patch 011) was bypassed. Also handles
          # one-time U-Boot fw_setenv on first boot. No-op on non-LS1046A.
          printf '%s\n' \
            '[Unit]' \
            'Description=Sync /boot/vyos.env with running VyOS image (LS1046A)' \
            'After=local-fs.target' \
            'ConditionPathExists=/proc/device-tree/compatible' \
            '' \
            '[Service]' \
            'Type=oneshot' \
            'ExecStart=/usr/local/bin/vyos-postinstall' \
            'RemainAfterExit=yes' \
            'StandardOutput=journal' \
            > "$CHROOT/etc/systemd/system/vyos-postinstall.service"
          # NOTE: No [Install] section — we use tmpfiles.d to create the
          # .wants symlink instead.  Neither `ln -sf` in includes.chroot
          # nor `systemctl enable` in a chroot hook survive live-build:
          #   - ln -sf: live-build dereferences absolute symlinks → empty file
          #   - systemctl enable: squashfs packs the .wants symlink as a
          #     regular file copy; systemd ignores non-symlink .wants entries
          # tmpfiles.d creates the symlink at BOOT TIME, after the overlay
          # is writable, so systemd sees a real symlink every time.
          mkdir -p "$CHROOT/usr/lib/tmpfiles.d"
          printf '%s\n' \
            '# Create systemd .wants symlink for vyos-postinstall at boot.' \
            '# Cannot use systemctl enable — live-build squashfs converts the' \
            '# symlink to a regular file, which systemd ignores.' \
            'L+ /etc/systemd/system/multi-user.target.wants/vyos-postinstall.service - - - - /etc/systemd/system/vyos-postinstall.service' \
            > "$CHROOT/usr/lib/tmpfiles.d/vyos-postinstall.conf"

          ### Fan control: EMC2305 PWM thermal management via standard fancontrol
          # DTS thermal-cooling binding is broken (EMC2305 registers cooling_device
          # but thermal OF doesn't bind it). Uses standard Linux fancontrol daemon
          # with config mapping EMC2305 PWM to core-cluster thermal zone.
          # Without fan control, SoC reaches 87°C under VPP poll mode.
          # IMPORTANT: hwmon numbers are unstable across boots. fancontrol-setup.sh
          # dynamically discovers emc2305 and core_cluster hwmon numbers by name
          # and regenerates /etc/fancontrol before the fancontrol daemon starts.
          cp data/scripts/fancontrol.conf "$CHROOT/etc/fancontrol"
          cp data/scripts/fancontrol-setup.sh "$CHROOT/usr/local/bin/fancontrol-setup"
          chmod +x "$CHROOT/usr/local/bin/fancontrol-setup"

          ### Systemd drop-in: run fancontrol-setup before fancontrol starts
          mkdir -p "$CHROOT/etc/systemd/system/fancontrol.service.d"
          printf '%s\n' \
            '[Service]' \
            'ExecStartPre=/usr/local/bin/fancontrol-setup' \
            > "$CHROOT/etc/systemd/system/fancontrol.service.d/hwmon-setup.conf"

          ### VPP/DPAA1 rebind: restore kernel netdev ownership when VPP stops
          # When VPP takes a DPAA1 port, vpp.py _dpaa_unbind_ifaces() unbinds
          # the port's dpaa-ethernet.N from fsl_dpa and writes the mapping to
          # /run/vpp-dpaa-unbound.json. This ExecStopPost script reads that file
          # and rebinds on VPP stop, so removing a port from VPP config and
          # committing restores kernel control (ip link shows the port again)
          # without requiring a full reboot.
          printf '%s\n' \
            '#!/bin/bash' \
            '# Rebind DPAA1 interfaces back to kernel fsl_dpa after VPP stops.' \
            'STATE=/run/vpp-dpaa-unbound.json' \
            'BIND=/sys/bus/platform/drivers/fsl_dpa/bind' \
            '[ -f "$STATE" ] || exit 0' \
            'python3 - <<PYEOF' \
            'import json, os, sys' \
            'state_file = "/run/vpp-dpaa-unbound.json"' \
            'bind_path  = "/sys/bus/platform/drivers/fsl_dpa/bind"' \
            'try:' \
            '    unbound = json.load(open(state_file))' \
            'except Exception:' \
            '    raise SystemExit(0)' \
            'if os.path.exists(bind_path):' \
            '    for iface, dev in unbound.items():' \
            '        try:' \
            '            open(bind_path, "w").write(dev)' \
            '            print(f"vpp-dpaa-rebind: restored {iface} ({dev}) to fsl_dpa")' \
            '        except OSError as e:' \
            '            print(f"vpp-dpaa-rebind: failed {iface}: {e}", file=__import__("sys").stderr)' \
            'try:' \
            '    os.unlink(state_file)' \
            'except OSError:' \
            '    pass' \
            'PYEOF' \
            > "$CHROOT/usr/local/bin/vpp-dpaa-rebind"
          chmod +x "$CHROOT/usr/local/bin/vpp-dpaa-rebind"
          mkdir -p "$CHROOT/etc/systemd/system/vpp.service.d"
          printf '%s\n' \
            '[Service]' \
            'ExecStopPost=/usr/local/bin/vpp-dpaa-rebind' \
            > "$CHROOT/etc/systemd/system/vpp.service.d/dpaa-rebind.conf"

          ### Install fancontrol + libatomic1 (chroot hook)
          HOOKS=vyos-build/data/live-build-config/hooks/live
          cat > "$HOOKS/98-fancontrol.chroot" << 'FANHOOK'
          #!/bin/bash
          # Install fancontrol daemon for EMC2305 PWM fan control
          # Config at /etc/fancontrol maps EMC2305 PWM to core-cluster thermal zone
          # libatomic1: required by DPAA-enabled dpdk_plugin.so (NEEDED: libatomic.so.1)
          #   — upstream vpp-plugin-dpdk does not depend on it, but our custom build
          #   statically links DPDK DPAA PMD which uses __atomic builtins on aarch64
          apt-get update -qq && apt-get install -y --no-install-recommends fancontrol libatomic1
          systemctl enable fancontrol.service
          # vyos-postinstall: enabled via tmpfiles.d (NOT systemctl enable).
          # systemctl enable creates a .wants symlink that live-build's squashfs
          # dereferences into a regular file — systemd ignores non-symlink .wants.
          apt-get clean
          FANHOOK
          chmod +x "$HOOKS/98-fancontrol.chroot"

          ### Boot optimization: mask unnecessary services for LS1046A
          # kexec masking forces full cold reboot on installed systems, ensuring
          # DPAA1/SFP/I2C hardware re-initializes cleanly (kexec skips firmware).
          # IMPORTANT: ln -sf /dev/null in includes.chroot gets converted to empty
          # files by live-build (symlinks to absolute paths outside chroot are
          # dereferenced). We use a chroot hook to create proper symlinks instead.
          cat > "$HOOKS/99-mask-services.chroot" << 'MASKHOOK'
          #!/bin/bash
          # kexec services: NOT masked — mainline 6.6 has QBMan kexec fix
          # (bman_requires_cleanup() / qman_requires_cleanup() detect prior init
          # and clean up BMan/QMan state, allowing kexec to work on DPAA1).
          # kexec enables VyOS managed-params self-healing (hugepages, panic, etc.)
          # via system_option.py without requiring SPI NOR writes or cold reboot.
          # SysV init scripts removed to prevent duplicate systemd unit generation,
          # but the systemd units themselves remain active (not masked).
          rm -f /etc/init.d/kexec-load /etc/init.d/kexec
          # ACPI daemon is useless on ARM64/DeviceTree platforms
          ln -sf /dev/null /etc/systemd/system/acpid.service
          ln -sf /dev/null /etc/systemd/system/acpid.socket
          ln -sf /dev/null /etc/systemd/system/acpid.path
          MASKHOOK
          chmod +x "$HOOKS/99-mask-services.chroot"

          ### Ethernet port remapping: FMan MAC → physical port position
          # FMan MACs probe by DT unit-address order (e2000, e8000, ea000, f0000,
          # f2000) which doesn't match physical port positions. systemd also
          # renames interfaces to e2-e6 using predictable naming.
          # Fix: udev rule calls fman-port-name script which reads each interface's
          # device-tree node to determine the correct ethN name. A .link file
          # prevents systemd from overriding the udev-assigned name.
          cp data/scripts/fman-port-name "$CHROOT/usr/local/bin/fman-port-name"
          chmod +x "$CHROOT/usr/local/bin/fman-port-name"
          mkdir -p "$CHROOT/etc/udev/rules.d"
          cp data/scripts/10-fman-port-order.rules "$CHROOT/etc/udev/rules.d/10-fman-port-order.rules"
          mkdir -p "$CHROOT/etc/systemd/network"
          cp data/scripts/00-fman.link "$CHROOT/etc/systemd/network/00-fman.link"

      - name: Build Image Packages
        run: |
          cd vyos-build/scripts/package-build
          source <(sed -n '/enable programmable completion/,$p' /etc/skel/.bashrc)
          set -ex
          # packages=$(ls .)
          # packages="radvd vyos-1x linux-kernel"
          packages="linux-kernel vyos-1x"
          ignore_packages=(amazon-cloudwatch-agent amazon-ssm-agent xen-guest-agent)
          for package in $packages; do
            [ ! -d $package ] && continue
            [[ " ${ignore_packages[@]} " =~ " ${package} " ]] && continue
            cd $package

            [ $package == "keepalived" ] && apt-get install -y libsnmp-dev

            ./build.py

            [ $package == "keepalived" ] && apt-get remove -y libsnmp-dev

            ### Build Mono Gateway DTB from kernel source (before cleanup)
            if [ "$package" == "linux-kernel" ]; then
              KSRC=$(find . -maxdepth 1 -type d -name 'linux-*' | head -1)
              if [ -n "$KSRC" ] && [ -d "$KSRC/arch/arm64/boot/dts/freescale" ]; then
                echo "### Building Mono Gateway DTB from kernel source"
                # Copy our custom DTS into the kernel tree
                cp "$GITHUB_WORKSPACE/data/dtb/mono-gateway-dk.dts" \
                   "$KSRC/arch/arm64/boot/dts/freescale/mono-gateway-dk.dts"
                # Build it using the kernel's DTS infrastructure
                make -C "$KSRC" freescale/mono-gateway-dk.dtb 2>&1 | tail -10 || true
                MONO_DTB="$KSRC/arch/arm64/boot/dts/freescale/mono-gateway-dk.dtb"
                if [ -f "$MONO_DTB" ]; then
                  # Replace the SDK-extracted DTB with our mainline-compiled one
                  cp "$MONO_DTB" "$GITHUB_WORKSPACE/vyos-build/data/live-build-config/includes.binary/mono-gw.dtb"
                  # Also copy into squashfs (/boot/) so install_image() auto-copies it
                  cp "$MONO_DTB" "$GITHUB_WORKSPACE/vyos-build/data/live-build-config/includes.chroot/boot/mono-gw.dtb"
                  echo "### Mono Gateway DTB compiled: $(stat -c '%s bytes' "$MONO_DTB")"
                else
                  echo "WARNING: mono-gateway-dk.dtb build failed, keeping SDK DTB"
                  ls "$KSRC/arch/arm64/boot/dts/freescale/"*.dtb 2>/dev/null | head -5 || true
                fi
              fi
            fi

            # clean
            df -Th
            apt-get autoremove -y
            rm -rf $package *.gz *.xz $HOME/.cache/go-build $HOME/go/pkg/mod $HOME/.rustup
            df -Th
            cd ..
          done

      - name: Pick Packages
        run: |
          cd vyos-build
          source <(sed -n '/enable programmable completion/,$p' /etc/skel/.bashrc)
          deb_files=$(find scripts/package-build -name "*.deb" -type f | \
            grep -v -- -dbg | \
            grep -v -- -dev | \
            grep -v -- -doc
          )
          ignore_packages=(
            charon-cmd
            dropbear-initramfs
            dropbear-run
            eapoltest
            frr-test-tools
            isc-dhcp-client-ddns
            isc-dhcp-common
            isc-dhcp-keama
            isc-dhcp-server
            isc-dhcp-server-ldap
            libnetsnmptrapd40
            libsnmp-perl
            libtac2-bin
            libyang-modules
            libyang-tools
            # python3-nftables
            rtr-tools
            sflowovsd.deb
            snmptrapd
            strongswan-nm
            strongswan-pki
            tkmib
            waagent
            wide-dhcpv6-relay
            wide-dhcpv6-server
            vpp-plugin-devtools
            accel-ppp
          )
          for deb_file in $deb_files; do
            if [[ " ${ignore_packages[@]} " =~ " $(basename $deb_file | cut -d_ -f1) " ]]; then
              echo "ignore $deb_file"
              continue
            fi
            cp $deb_file packages
          done
          ls -alh packages

      - name: Build DPDK + VPP DPAA Plugin
        run: |
          set -ex
          echo "### Step 1/3: Build DPDK 24.11 with DPAA1 PMD (native ARM64, static)"
          DPDK_WORK=/tmp/dpdk-build
          DPDK_OUTPUT=$DPDK_WORK/output
          mkdir -p $DPDK_WORK $DPDK_OUTPUT

          # Install DPDK build deps (meson/ninja may already exist in builder image)
          # libfdt-dev: required by DPAA bus driver (bus/dpaa depends on libfdt)
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            meson ninja-build pkg-config python3-pyelftools \
            libelf-dev libnuma-dev libfdt-dev 2>&1 | tail -5

          # Clone DPDK v24.11 (shallow)
          git clone --depth=1 -b v24.11 https://github.com/DPDK/dpdk.git $DPDK_WORK/dpdk

          # Apply portal mmap patch (DPDK userspace must mmap portal windows via usdpaa fd)
          cd $DPDK_WORK/dpdk
          patch -p1 < $GITHUB_WORKSPACE/data/dpdk-portal-mmap.patch || true

          # Meson setup — native ARM64, static build, DPAA enabled
          export PKG_CONFIG_LIBDIR="/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig"
          # -Dmachine=generic: runner is Neoverse-N2 but target is Cortex-A72 (LS1046A)
          # Without this, meson auto-detects -mcpu=neoverse-n2+sve2 which crashes on A72
          meson setup build \
            --prefix="$DPDK_OUTPUT" \
            -Ddefault_library=static \
            -Dmax_lcores=4 \
            -Dmachine=generic \
            -Denable_kmods=false \
            -Dtests=false \
            -Dexamples= \
            -Ddisable_drivers="net/mlx*,net/bnxt,net/ixg*,net/ice,net/i40e,net/e1000,crypto/qat,net/virtio,net/vmxnet*,net/ena,net/hns*,net/hinic,net/octeontx*,net/cnxk,net/thunderx"
          ninja -C build -j$(nproc)
          ninja -C build install

          # Verify DPAA PMD: check for individual librte_*dpaa*.a files
          # (libdpdk.a is a GROUP linker script on Debian, ar t fails on it)
          DPAA_LIBS=$(find "$DPDK_OUTPUT" -name 'librte_*dpaa*.a' -not -name '*dpaa2*' | wc -l)
          DPAA2_LIBS=$(find "$DPDK_OUTPUT" -name 'librte_*dpaa2*.a' | wc -l)
          echo "### DPDK built: $(du -sh $DPDK_OUTPUT | cut -f1), DPAA1 libs: $DPAA_LIBS, DPAA2 libs: $DPAA2_LIBS"

          # Find actual libdpdk.a path (may be lib/ or lib/aarch64-linux-gnu/)
          # Use -maxdepth to avoid picking up build intermediates; accept any file type
          # (meson creates GROUP linker scripts which are regular files)
          DPDK_LIB=$(find "$DPDK_OUTPUT" -name 'libdpdk.a' | head -1)
          DPDK_INC=$(find "$DPDK_OUTPUT" -path '*/dpdk/rte_config.h' -type f -printf '%h\n' | head -1)
          echo "DPDK_LIB=$DPDK_LIB"
          echo "DPDK_INC=$DPDK_INC"
          echo "DPDK_OUTPUT=$DPDK_OUTPUT"
          echo "DPDK_LIB=$DPDK_LIB" >> $GITHUB_ENV
          echo "DPDK_INC=$DPDK_INC" >> $GITHUB_ENV
          echo "DPDK_OUTPUT=$DPDK_OUTPUT" >> $GITHUB_ENV
          ls -la "$DPDK_LIB" 2>/dev/null || echo "WARNING: libdpdk.a not found"
          head -1 "$DPDK_LIB" 2>/dev/null || true

          # Return to workspace before cleanup (rm -rf while cwd is inside target = fatal)
          cd $GITHUB_WORKSPACE
          rm -rf $DPDK_WORK/dpdk

          echo "### Step 2/3: Build VPP DPDK plugin with DPAA1 mempool patches"
          VPP_WORK=/tmp/vpp-plugin-build
          mkdir -p $VPP_WORK

          # Clone VPP (shallow) — only need plugins/dpdk, vppinfra/linux, plugins/vxlan
          git clone --depth=1 --filter=blob:none --sparse \
            https://github.com/FDIo/vpp.git $VPP_WORK/vpp 2>&1 | tail -5
          cd $VPP_WORK/vpp
          git sparse-checkout set src/plugins/dpdk src/vppinfra/linux src/plugins/vxlan
          VPP_SRC=$VPP_WORK/vpp/src

          # Apply DPAA mempool patches to VPP dpdk plugin source
          # (inline version of bin/patch-vpp-dpaa-mempool.sh adapted for CI paths)
          DPDK_PLUGIN=$VPP_SRC/plugins/dpdk
          DRIVER="$DPDK_PLUGIN/device/driver.c"
          DPDK_H="$DPDK_PLUGIN/device/dpdk.h"
          INIT="$DPDK_PLUGIN/device/init.c"
          COMMON="$DPDK_PLUGIN/device/common.c"

          # Patch 1: Add net_dpaa to driver.c
          if ! grep -q '"net_dpaa"' "$DRIVER" 2>/dev/null; then
            sed -i '/\.drivers = DPDK_DRIVERS.*"net_dpaa2"/i\  {\n    .drivers = DPDK_DRIVERS ({ "net_dpaa", "NXP DPAA1 FMan Mac" }),\n    .interface_name_prefix = "TenGigabitEthernet",\n  },' "$DRIVER"
          fi

          # Patch 2: Add IS_DPAA flag to dpdk.h
          if ! grep -q 'IS_DPAA' "$DPDK_H" 2>/dev/null; then
            sed -i '/_ (15, TX_PREPARE, "tx-prepare")/a\  _ (16, IS_DPAA, "dpaa-device")                                              \\' "$DPDK_H"
          fi

          # Patch 3: Add dpaa_mempool to dpdk_main_t
          if ! grep -q 'dpaa_mempool' "$DPDK_H" 2>/dev/null; then
            sed -i '/^} dpdk_main_t;/i\\n  /* DPAA1 BMan hardware mempool for DPAA PMD devices */\n  struct rte_mempool *dpaa_mempool;' "$DPDK_H"
          fi

          # Patch 4: Add IS_DPAA detection in init.c
          if ! grep -q 'IS_DPAA' "$INIT" 2>/dev/null; then
            sed -i "/dpdk_log_warn.*unknown driver.*driver_name/a\\
          \\
                /* Mark DPAA1 devices for BMan mempool routing */\\
                if (di.driver_name \&\& strstr (di.driver_name, \"net_dpaa\") \&\&\\
                    !strstr (di.driver_name, \"net_dpaa2\"))\\
                  dpdk_device_flag_set (xd, DPDK_DEVICE_FLAG_IS_DPAA, 1);" "$INIT"
          fi

          # Patch 5: Add dpdk_dpaa_mempool_create() function + call
          if ! grep -q 'dpaa_mempool_create' "$INIT" 2>/dev/null; then
            cat > /tmp/dpaa_mempool_func.c << 'CFUNC'

          static void
          dpdk_dpaa_mempool_create (dpdk_main_t *dm)
          {
            dm->dpaa_mempool = rte_pktmbuf_pool_create_by_ops (
              "dpaa_vpp_pool", 4096, 256, 0, RTE_MBUF_DEFAULT_BUF_SIZE, 0, "dpaa");
            if (!dm->dpaa_mempool)
              dpdk_log_notice ("DPAA mempool not created: %s", rte_strerror (rte_errno));
            else
              dpdk_log_notice ("DPAA BMan mempool created: %u buffers", dm->dpaa_mempool->size);
          }
          CFUNC
            LAST_INCLUDE=$(grep -n '^#include' "$INIT" | tail -1 | cut -d: -f1)
            sed -i "${LAST_INCLUDE}r /tmp/dpaa_mempool_func.c" "$INIT"
            sed -i '/error = dpdk_lib_init (dm);/i\  dpdk_dpaa_mempool_create (dm);' "$INIT"
            rm -f /tmp/dpaa_mempool_func.c
          fi

          # Patch 6: Route DPAA devices to BMan mempool in common.c
          if ! grep -q 'IS_DPAA' "$COMMON" 2>/dev/null; then
            sed -i '/^dpdk_device_setup (dpdk_device_t \* xd)/,/ASSERT/{
              /ASSERT/a\  dpdk_main_t *dm = \&dpdk_main;
            }' "$COMMON"
            sed -i 's|struct rte_mempool \*mp = dpdk_mempool_by_buffer_pool_index\[bpidx\];|struct rte_mempool *mp;\n      if ((xd->flags \& DPDK_DEVICE_FLAG_IS_DPAA) \&\& dm->dpaa_mempool)\n        mp = dm->dpaa_mempool;\n      else\n        mp = dpdk_mempool_by_buffer_pool_index[bpidx];|' "$COMMON"
          fi

          # Patch 7: Add rte_mbuf.h include
          if ! grep -q 'rte_mbuf.h' "$INIT" 2>/dev/null; then
            sed -i '1,/^#include.*dpdk.h/{/^#include.*dpdk.h/a\#include <rte_mbuf.h>
          }' "$INIT"
          fi

          echo "### VPP DPAA patches applied"

          # Download vpp-dev headers from VyOS mirror
          VPP_DEV_DIR=$VPP_WORK/vpp-dev
          mkdir -p $VPP_DEV_DIR /tmp/vpp-debs
          cd /tmp/vpp-debs

          # Add VyOS repo temporarily to download vpp-dev
          echo "deb [trusted=yes] $VYOS_MIRROR current main" > /etc/apt/sources.list.d/vyos-tmp.list
          apt-get update -qq 2>&1 | tail -3
          apt-get download vpp-dev vpp libvppinfra libvppinfra-dev 2>&1 | tail -5
          rm -f /etc/apt/sources.list.d/vyos-tmp.list

          # Extract headers
          for deb in *.deb; do
            dpkg-deb -x "$deb" "$VPP_DEV_DIR" 2>/dev/null || true
          done
          rm -f /tmp/vpp-debs/*.deb

          # Remove upstream dpdk plugin headers (we use our DPAA-patched copy)
          rm -rf "$VPP_DEV_DIR/usr/include/vpp_plugins/dpdk"

          # Copy supplementary headers from VPP source
          mkdir -p "$VPP_DEV_DIR/usr/include/vppinfra/linux"
          cp "$VPP_SRC/vppinfra/linux/sysfs.c" "$VPP_DEV_DIR/usr/include/vppinfra/linux/" 2>/dev/null || true
          mkdir -p "$VPP_DEV_DIR/usr/include/vpp_plugins/vxlan"
          cp "$VPP_SRC/plugins/vxlan/vxlan.h" "$VPP_DEV_DIR/usr/include/vpp_plugins/vxlan/" 2>/dev/null || true
          cp "$VPP_SRC/plugins/vxlan/vxlan_packet.h" "$VPP_DEV_DIR/usr/include/vpp_plugins/vxlan/" 2>/dev/null || true
          cp "$VPP_SRC/plugins/vxlan/vxlan_error.def" "$VPP_DEV_DIR/usr/include/vpp_plugins/vxlan/" 2>/dev/null || true

          # Set up out-of-tree cmake build
          BUILD_DIR=$VPP_WORK/build-oot
          mkdir -p "$BUILD_DIR/plugins"
          cp -a "$DPDK_PLUGIN" "$BUILD_DIR/plugins/dpdk"

          cat > "$BUILD_DIR/CMakeLists.txt" << 'CMAKE'
          cmake_minimum_required(VERSION 3.16)
          project(vpp-dpdk-plugin C)
          macro(string_append var str)
            if (NOT ${var}) set(${var} "${str}") else() set(${var} "${${var}} ${str}") endif()
          endmacro()
          macro(vpp_find_path var)
            cmake_parse_arguments(ARG "" "" "PATH_SUFFIXES;NAMES" ${ARGN})
            find_path(${var} PATH_SUFFIXES ${ARG_PATH_SUFFIXES} NAMES ${ARG_NAMES})
          endmacro()
          macro(vpp_plugin_find_library plugin var name)
            find_library(${var} NAMES ${name})
            if(NOT ${var}) message(WARNING "-- ${plugin} plugin needs ${name} - not found")
            else() message(STATUS "-- ${plugin} plugin needs ${name} - found at ${${var}}") endif()
          endmacro()
          find_package(VPP REQUIRED)
          set(VPP_USE_SYSTEM_DPDK OFF CACHE BOOL "" FORCE)
          set(PRE_DATA_SIZE 128)
          unset(OPENSSL_FOUND)
          add_subdirectory(plugins/dpdk)
          CMAKE

          # Find VPP cmake path
          VPP_CMAKE=$(find "$VPP_DEV_DIR" -name 'VPPConfig.cmake' -printf '%h\n' | head -1)

          mkdir -p "$BUILD_DIR/build" && cd "$BUILD_DIR/build"
          cmake .. \
            -G Ninja \
            -DCMAKE_C_FLAGS="-O2 -I$BUILD_DIR/plugins" \
            -DCMAKE_PREFIX_PATH="$VPP_CMAKE" \
            -DCMAKE_FIND_ROOT_PATH="$VPP_DEV_DIR/usr;$DPDK_OUTPUT" \
            -DVPP_INCLUDE_DIR="$VPP_DEV_DIR/usr/include" \
            -DVPP_APIGEN="$VPP_DEV_DIR/usr/bin/vppapigen" \
            -DDPDK_INCLUDE_DIR="$DPDK_INC" \
            -DDPDK_LIB="$DPDK_LIB" \
            2>&1 | grep -E '(Found DPDK|libdpdk|numa|Configuring done|FATAL|ERROR)'
          ninja -j$(nproc) 2>&1

          echo "### Step 3/3: Verify and deploy plugin"
          # Find the built plugin
          PLUGIN=$(find "$BUILD_DIR" /vpp_plugins -name 'dpdk_plugin.so' -newer "$BUILD_DIR/CMakeLists.txt" 2>/dev/null | head -1)
          if [ -z "$PLUGIN" ]; then
            echo "WARNING: dpdk_plugin.so not found — ISO will use upstream plugin"
          else
            PLUGIN_SIZE=$(stat -c%s "$PLUGIN")
            DPAA_SYMS=$(nm -D "$PLUGIN" 2>/dev/null | grep -ci dpaa || true)
            PMD_INIT=$(nm "$PLUGIN" 2>/dev/null | grep -c 'dpaainitfn_net_dpaa' || true)
            echo "### Plugin: $(du -h $PLUGIN | cut -f1), DPAA symbols: $DPAA_SYMS, PMD constructor: $PMD_INIT"

            if [ "$PLUGIN_SIZE" -gt 5000000 ] && [ "$PMD_INIT" -ge 1 ]; then
              # Deploy to includes.chroot (overrides upstream vpp-plugin-dpdk)
              CHROOT=$GITHUB_WORKSPACE/vyos-build/data/live-build-config/includes.chroot
              mkdir -p "$CHROOT/usr/lib/aarch64-linux-gnu/vpp_plugins"
              cp "$PLUGIN" "$CHROOT/usr/lib/aarch64-linux-gnu/vpp_plugins/dpdk_plugin.so"
              echo "### DPAA-enabled dpdk_plugin.so deployed to includes.chroot"
            else
              echo "WARNING: Plugin too small or missing PMD constructor — keeping upstream"
            fi
          fi

          # Cleanup build artifacts to save disk
          rm -rf $DPDK_WORK $VPP_WORK
          df -Th

      - name: Build VyOS ISO
        id: build_iso
        run: |
          cd vyos-build
          source <(sed -n '/enable programmable completion/,$p' /etc/skel/.bashrc)
          set -ex

          ### Copy mainline RDB DTB if built during kernel step
          if [ -f "$GITHUB_WORKSPACE/data/dtb/fsl-ls1046a-rdb.dtb" ]; then
            cp "$GITHUB_WORKSPACE/data/dtb/fsl-ls1046a-rdb.dtb" \
              data/live-build-config/includes.binary/fsl-ls1046a-rdb.dtb
            echo "### Mainline RDB DTB included in ISO"
          fi

          rm -rf packages/linux-headers-*

          ./build-vyos-image \
            --architecture arm64 \
            --build-by $BUILD_BY \
            --build-type release \
            --debian-mirror $DEBIAN_MIRROR \
            --debian-security-mirror $DEBIAN_SECURITY_MIRROR \
            --version ${{ steps.set_env_variables.outputs.build_version }} \
            --vyos-mirror $VYOS_MIRROR \
            --custom-package vim-tiny \
            --custom-package neofetch \
            --custom-package tree \
            --custom-package btop \
            --custom-package ripgrep \
            --custom-package wget \
            --custom-package ncdu \
            --custom-package fastnetmon \
            --custom-package containernetworking-plugins \
            --custom-package mokutil \
            --custom-package grub-efi-arm64-signed \
            --custom-package u-boot-tools \
            --custom-package libubootenv-tool \
            generic
          cd build
          # Rename generic -> LS1046A in artifact filenames
          ORIG_ISO=$(jq --raw-output .artifacts[0] manifest.json)
          IMAGE_ISO="${ORIG_ISO/generic/LS1046A}"
          IMAGE_NAME="${IMAGE_ISO%.iso}"
          mv "$ORIG_ISO" "$IMAGE_ISO"
          echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "image_iso=${IMAGE_ISO}" >> $GITHUB_OUTPUT
          # Cryptographically sign the image
          MINISIGN_PUBKEY_FILE=$GITHUB_WORKSPACE/data/vyos-ls1046a.minisign.pub
          MINISIGN_SECKEY_FILE=$GITHUB_WORKSPACE/data/vyos-ls1046a.minisign.key
          if [ -f "$MINISIGN_SECKEY_FILE" ]; then
            $GITHUB_WORKSPACE/bin/minisign -s $MINISIGN_SECKEY_FILE -Sm ${IMAGE_ISO}
            $GITHUB_WORKSPACE/bin/minisign -Vm ${IMAGE_ISO} -x ${IMAGE_ISO}.minisig -p $MINISIGN_PUBKEY_FILE
          else
            echo "fake sign" > ${IMAGE_ISO}.minisig
          fi
          ### Create FAT32 USB boot image
          # U-Boot reads FAT32 natively. ISO9660 requires Rufus workarounds.
          # Linux/macOS: dd if=vyos-*-usb.img of=/dev/sdX bs=4M
          # Windows: Rufus → select .img → DD Image mode (NOT ISO mode)
          # Layout: /live/{vmlinuz,initrd.img,filesystem.squashfs} + /mono-gw.dtb + /boot.scr
          USB_IMG="${IMAGE_NAME}-usb.img"
          mkdir -p /tmp/iso-mount
          mount -o loop "$IMAGE_ISO" /tmp/iso-mount
          truncate -s 4G "$USB_IMG"
          mkdosfs -F 32 -n VYOSBOOT "$USB_IMG"
          mmd   -i "$USB_IMG" ::/live
          mcopy -i "$USB_IMG" /tmp/iso-mount/live/vmlinuz             ::/live/vmlinuz
          mcopy -i "$USB_IMG" /tmp/iso-mount/live/initrd.img          ::/live/initrd.img
          mcopy -i "$USB_IMG" /tmp/iso-mount/live/filesystem.squashfs ::/live/filesystem.squashfs
          mcopy -i "$USB_IMG" $GITHUB_WORKSPACE/data/dtb/mono-gw.dtb  ::mono-gw.dtb

          # Generate U-Boot boot script (boot.scr) — loads kernel/DTB/initrd from USB FAT32
          # and boots directly. Does NOT modify U-Boot environment or SPI flash.
          # eMMC boot setup is handled by vyos-postinstall after install image.
          # Source: data/scripts/boot.cmd (compiled with mkimage)
          mkimage -A arm64 -T script -C none -n "VyOS LS1046A USB Boot" \
            -d "$GITHUB_WORKSPACE/data/scripts/boot.cmd" /tmp/boot.scr
          mcopy -i "$USB_IMG" /tmp/boot.scr ::boot.scr

          umount /tmp/iso-mount

          # Compress USB image — raw 4 GiB FAT32 (mostly zeros) exceeds GitHub's
          # 2 GiB release asset limit. zstd -19 shrinks it to ~800 MB.
          # Decompress before writing to USB: zstd -d vyos-*-usb.img.zst
          zstd -T0 -19 --rm "${USB_IMG}"
          USB_IMG="${USB_IMG}.zst"

          if [ -f "$MINISIGN_SECKEY_FILE" ]; then
            $GITHUB_WORKSPACE/bin/minisign -s $MINISIGN_SECKEY_FILE -Sm "${USB_IMG}"
            $GITHUB_WORKSPACE/bin/minisign -Vm "${USB_IMG}" -x "${USB_IMG}.minisig" -p $MINISIGN_PUBKEY_FILE
          else
            echo "fake sign" > "${USB_IMG}.minisig"
          fi
          echo "usb_img=${USB_IMG}" >> $GITHUB_OUTPUT

          # Move all artifacts to workspace
          mv manifest.json ${IMAGE_ISO} ${IMAGE_ISO}.minisig \
             "${USB_IMG}" "${USB_IMG}.minisig" $GITHUB_WORKSPACE

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build_iso.outputs.image_name }}
          path: |
            manifest.json
            ${{ steps.build_iso.outputs.image_iso }}
            ${{ steps.build_iso.outputs.image_iso }}.minisig
            ${{ steps.build_iso.outputs.usb_img }}
            ${{ steps.build_iso.outputs.usb_img }}.minisig
          retention-days: 15
          if-no-files-found: error
          compression-level: 0

  publish:
    needs:
      - build_iso
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    if: github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v6
      - name: Clone vyos-build repo
        uses: actions/checkout@v6
        with:
          repository: vyos/vyos-build
          path: vyos-build
          fetch-depth: 0
      - name: Clone vyos-1x source code
        uses: actions/checkout@v6
        with:
          repository: vyos/vyos-1x
          path: vyos-1x
          fetch-depth: 0
      - id: commit_ids
        name: Get commit IDs for changelog
        run: |
          set -ex
          cd vyos-build
          git log --since "${{ needs.build_iso.outputs.PREVIOUS_SUCCESS_BUILD_TIMESTAMP }}" --format="%H" --reverse
          CHANGELOG_COMMIT_VYOS_BUILD=$(git log --since "${{ needs.build_iso.outputs.PREVIOUS_SUCCESS_BUILD_TIMESTAMP }}" --format="%H" --reverse | head -n1)
          [ -z "$CHANGELOG_COMMIT_VYOS_BUILD" ] && CHANGELOG_COMMIT_VYOS_BUILD="HEAD"
          echo "CHANGELOG_COMMIT_VYOS_BUILD=${CHANGELOG_COMMIT_VYOS_BUILD}" >> $GITHUB_OUTPUT
          cd ../vyos-1x
          git log --since "${{ needs.build_iso.outputs.PREVIOUS_SUCCESS_BUILD_TIMESTAMP }}" --format="%H" --reverse
          CHANGELOG_COMMIT_VYOS_1X=$(git log --since "${{ needs.build_iso.outputs.PREVIOUS_SUCCESS_BUILD_TIMESTAMP }}" --format="%H" --reverse | head -n1)
          [ -z "$CHANGELOG_COMMIT_VYOS_1X" ] && CHANGELOG_COMMIT_VYOS_1X="HEAD"
          echo "CHANGELOG_COMMIT_VYOS_1X=${CHANGELOG_COMMIT_VYOS_1X}" >> $GITHUB_OUTPUT

      - name: "Release publishing: generate changelog for vyos-1x"
        id: generate_changelog_for_vyos-1x
        uses: mikepenz/release-changelog-builder-action@v6.1.1
        with:
          owner: "vyos"
          repo: "vyos-1x"
          fetchReviewers: false
          fromTag: ${{ steps.commit_ids.outputs.CHANGELOG_COMMIT_VYOS_1X }}
          toTag: HEAD
          configurationJson: |
            {
              "categories": [{"title": "", "labels": []}],
              "template": "#{{CHANGELOG}}",
              "pr_template": "- #{{TITLE}}\n   - PR: vyos/vyos-1x##{{NUMBER}}"
            }

      - name: "Release publishing: generate changelog for vyos-build"
        id: generate_changelog_for_vyos-build
        uses: mikepenz/release-changelog-builder-action@v6.1.1
        with:
          owner: "vyos"
          repo: "vyos-build"
          fetchReviewers: false
          fromTag: ${{ steps.commit_ids.outputs.CHANGELOG_COMMIT_VYOS_BUILD }}
          toTag: HEAD
          configurationJson: |
            {
              "categories": [{"title": "", "labels": []}],
              "template": "#{{CHANGELOG}}",
              "pr_template": "- #{{TITLE}}\n   - PR: vyos/vyos-build##{{NUMBER}}"
            }

      - name: "Release publishing: generate release notes"
        run: |
          cat <<EOF > /tmp/release_notes.md
          ## Upstream changes since last build

          ### vyos-1x
          ${{ steps.generate_changelog_for_vyos-1x.outputs.changelog }}
          ### vyos-build
          ${{ steps.generate_changelog_for_vyos-build.outputs.changelog }}
          EOF
          cat /tmp/release_notes.md

      - name: "Release publishing: create version.json"
        uses: jsdaniell/create-json@v1.2.3
        with:
          name: "version.json"
          json: |
            [
              {
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ needs.build_iso.outputs.build_version }}/${{ needs.build_iso.outputs.image_iso }}",
                "version": "${{ needs.build_iso.outputs.build_version }}",
                "timestamp": "${{ needs.build_iso.outputs.TIMESTAMP }}"
              }
            ]

      - name: "Release publishing: check if the repository was modified during runtime to prevent autocommit failure"
        id: check_if_the_repository_was_modified_during_runtime
        run: |
          sudo chown -R $(whoami):$(whoami) ./*
          # Save version.json (modified by create-json step), pull latest, restore
          cp version.json /tmp/version.json.new
          git checkout -- version.json 2>/dev/null || true
          git pull --rebase || true
          cp /tmp/version.json.new version.json

      - name: "Release publishing: create autocommit and tag"
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          tagging_message: ${{ needs.build_iso.outputs.build_version }}
          commit_message: ${{ needs.build_iso.outputs.build_version }}
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"

      - uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build_iso.outputs.image_name }}

      - name: "Release publishing: publish release"
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          tag_name: ${{ needs.build_iso.outputs.build_version }}
          fail_on_unmatched_files: false
          files: |
            ${{ needs.build_iso.outputs.image_iso }}
            ${{ needs.build_iso.outputs.image_iso }}.minisig
            vyos-*-usb.img.zst
            vyos-*-usb.img.zst.minisig

      - uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 10
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
