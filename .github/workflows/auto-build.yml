name: VyOS LS1046A build

on:
  schedule:
    - cron: "0 1 * * 5"

  workflow_dispatch:
    inputs:
      BUILD_BY:
        description: 'Builder identifier (auto: mihakralj@users.noreply.github.com)'
        default: ''
      build_version:
        description: 'Version number (auto: YYYY.MM.DD-HHMM-rolling)'
        default: ''
      builder_image:
        description: 'Builder Docker image'
        default: 'ghcr.io/huihuimoe/vyos-arm64-build/vyos-builder:current-arm64'

env:
  DEBIAN_MIRROR: http://deb.debian.org/debian/
  DEBIAN_SECURITY_MIRROR: http://deb.debian.org/debian-security
  # ~~no package on the official repo~~ fixed
  VYOS_MIRROR: https://packages.vyos.net/repositories/current/
  # this repo doesn't seem to be updated anymore
  # https://dev.packages.vyos.net/?dir=repositories/current/dists/current
  # VYOS_MIRROR: https://rolling-packages.vyos.net/current/

jobs:
  build_iso:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    container:
      image: ${{ github.event.inputs.builder_image || 'ghcr.io/huihuimoe/vyos-arm64-build/vyos-builder:current-arm64' }}
      options: --sysctl net.ipv6.conf.lo.disable_ipv6=0 --privileged --user root
    defaults:
      run:
        shell: bash
    outputs:
      BUILD_BY: ${{ steps.set_env_variables.outputs.BUILD_BY }}
      build_version: ${{ steps.set_env_variables.outputs.build_version }}
      TIMESTAMP: ${{ steps.set_env_variables.outputs.TIMESTAMP }}
      PREVIOUS_SUCCESS_BUILD_TIMESTAMP: ${{ steps.set_env_variables.outputs.PREVIOUS_SUCCESS_BUILD_TIMESTAMP }}
      image_iso: ${{ steps.build_iso.outputs.image_iso }}
      image_name: ${{ steps.build_iso.outputs.image_name }}

    steps:
      - name: Install Dependencies
        run: |
          source <(sed -n '/enable programmable completion/,$p' /etc/skel/.bashrc)
          set -ex
          echo "HOME: $HOME"
          echo "PATH: $PATH"
          command -v go
          command -v opam
          lscpu
          free -m
          # Install missing packages
          apt-get update -qq
          apt-get install -y \
            libsystemd-dev libglib2.0-dev libip4tc-dev libipset-dev libnfnetlink-dev \
            libnftnl-dev libnl-nf-3-dev libpopt-dev libpcap-dev libbpf-dev \
            bubblewrap git-lfs kpartx clang llvm cmake \
            protobuf-compiler python3-cracklib python3-protobuf \
            libreadline-dev liblua5.3-dev byacc flex
          # python3-cracklib: https://github.com/vyos/vyos-build/commit/e846e68f9f6457865f3e3af92adfe42933555c59
          # protobuf-compiler: https://github.com/vyos/vyos-build/commit/0a6c197226400c4bbe210b435baaa716d4fb8377
          # python3-protobuf: https://github.com/vyos/vyos-build/commit/dd2c245be73c1e83b6ca392924aa549f77c5586e
          apt-get upgrade -y

      - uses: actions/checkout@v6
        with:
          lfs: true
      - name: "Initialization: set env variables"
        id: set_env_variables
        run: |
          source <(sed -n '/enable programmable completion/,$p' /etc/skel/.bashrc)
          set -ex
          if [ -n "${{ github.event.inputs.BUILD_BY }}" ]; then
            echo "BUILD_BY=${{ github.event.inputs.BUILD_BY }}" >> $GITHUB_ENV
            echo "BUILD_BY=${{ github.event.inputs.BUILD_BY }}" >> $GITHUB_OUTPUT
          else
            echo "BUILD_BY=${{ github.repository_owner_id }}+${{ github.repository_owner }}@users.noreply.github.com" >> $GITHUB_ENV
            echo "BUILD_BY=${{ github.repository_owner_id }}+${{ github.repository_owner }}@users.noreply.github.com" >> $GITHUB_OUTPUT
          fi
          if [ -z "${{ github.event.inputs.build_version }}" ]; then
            echo "build_version=$(date -u +%Y.%m.%d-%H%M)-rolling" >> $GITHUB_OUTPUT
          else
            echo "build_version=${{ github.event.inputs.build_version }}" >> $GITHUB_OUTPUT
          fi
          echo "TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "PREVIOUS_SUCCESS_BUILD_TIMESTAMP=$(cat version.json | jq -r '.[0].timestamp')" >> $GITHUB_OUTPUT

      - name: Checkout vyos-build repo
        uses: actions/checkout@v6
        with:
          repository: vyos/vyos-build
          path: vyos-build

      - name: Fix vyos-build
        env:
          MOK_KEY: ${{ secrets.MOK_KEY }}
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
        run: |
          [ -n "$MOK_KEY" ] && echo "$MOK_KEY" > data/mok/MOK.key
          [ -n "$MINISIGN_PRIVATE_KEY" ] && echo "$MINISIGN_PRIVATE_KEY" > data/vyos-ls1046a.minisign.key

          source <(sed -n '/enable programmable completion/,$p' /etc/skel/.bashrc)
          set -ex

          ### vyos-1x patches
          git clone --recursive https://github.com/vyos/vyos-1x \
            -b current --single-branch vyos-build/scripts/package-build/vyos-1x/vyos-1x
          # reftree.cache: internal blob required for build but missing from upstream repo
          cp data/reftree.cache vyos-build/scripts/package-build/vyos-1x/vyos-1x/data/reftree.cache
          VYOS1X=vyos-build/scripts/package-build/vyos-1x/vyos-1x
          patch --no-backup-if-mismatch -p1 -d "$VYOS1X" < data/vyos-1x-001-system_console.patch
          patch --no-backup-if-mismatch -p1 -d "$VYOS1X" < data/vyos-1x-003-increase_vyshim_init_timeout.patch
          patch --no-backup-if-mismatch -p1 -d "$VYOS1X" < data/vyos-1x-005-fix_podman_service.patch
          patch --no-backup-if-mismatch -p1 -d "$VYOS1X" < data/vyos-1x-006-install-image-reserve-gap.patch
          patch --no-backup-if-mismatch -p1 -d "$VYOS1X" < data/vyos-1x-007-prefer-emmc-default.patch
          patch --no-backup-if-mismatch -p1 -d "$VYOS1X" < data/vyos-1x-008-raid-default-no.patch
          patch --no-backup-if-mismatch -p1 -d "$VYOS1X" < data/vyos-1x-009-uboot-live-boot-detection.patch
          patch --no-backup-if-mismatch -p1 -d "$VYOS1X" < data/vyos-1x-010-vpp-platform-bus.patch
          sed -i 's/all: clean copyright/all: clean/' "$VYOS1X/Makefile"

          ### vyos-build patches
          cp data/config.boot.default vyos-build/data/live-build-config/includes.chroot/opt/vyatta/etc/
          cp data/config.boot.dhcp vyos-build/data/live-build-config/includes.chroot/opt/vyatta/etc/
          patch --no-backup-if-mismatch -p1 -d vyos-build < data/vyos-build-005-add_vim_link.patch
          patch --no-backup-if-mismatch -p1 -d vyos-build < data/vyos-build-007-no_sbsign.patch

          ### LS1046A kernel config (DPAA1/FMan networking, eMMC, serial, MTD/SPI for FMan firmware)
          DEFCONFIG=vyos-build/scripts/package-build/linux-kernel/config/arm64/vyos_defconfig
          printf '%s\n' \
            '# === LS1046A / NXP Layerscape DPAA1 (Mono Gateway DK) ===' \
            'CONFIG_DEVTMPFS_MOUNT=y' \
            'CONFIG_FSL_FMAN=y' \
            'CONFIG_FSL_DPAA=y' \
            'CONFIG_FSL_DPAA_ETH=y' \
            'CONFIG_FSL_DPAA_MACSEC=y' \
            'CONFIG_FSL_XGMAC_MDIO=y' \
            'CONFIG_PHY_FSL_LYNX_28G=y' \
            'CONFIG_FSL_BMAN=y' \
            'CONFIG_FSL_QMAN=y' \
            'CONFIG_FSL_PAMU=y' \
            'CONFIG_HWMON=y' \
            'CONFIG_MAXLINEAR_GPHY=y' \
            'CONFIG_MMC_SDHCI_OF_ESDHC=y' \
            'CONFIG_FSL_EDMA=y' \
            'CONFIG_SERIAL_OF_PLATFORM=y' \
            'CONFIG_MTD=y' \
            'CONFIG_MTD_SPI_NOR=y' \
            'CONFIG_SPI=y' \
            'CONFIG_SPI_FSL_DSPI=y' \
            'CONFIG_SPI_FSL_QSPI=y' \
            'CONFIG_CDX_BUS=y' \
            '# CONFIG_DEBUG_PREEMPT is not set' \
            'CONFIG_QORIQ_CPUFREQ=y' \
            'CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y' \
            '# CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL is not set' \
            '# === SFP support (10G copper/fiber transceivers) ===' \
            'CONFIG_SFP=y' \
            'CONFIG_PHYLINK=y' \
            'CONFIG_PHY_FSL_LYNX_10G=y' \
            'CONFIG_I2C_MUX=y' \
            'CONFIG_I2C_MUX_PCA954x=y' \
            'CONFIG_AQUANTIA_PHY=y' \
            'CONFIG_REALTEK_PHY=y' \
            '# === I2C + GPIO controllers (required for SFP I2C mux and GPIOs) ===' \
            'CONFIG_I2C_IMX=y' \
            'CONFIG_GPIO_MPC8XXX=y' \
            '# === Board peripherals (fan, thermal, RTC, power sensors) ===' \
            'CONFIG_SENSORS_EMC2305=y' \
            'CONFIG_RTC_DRV_PCF2127=y' \
            >> "$DEFCONFIG"

          ### Remove --uefi-secure-boot from grub-install
          # U-Boot boots via booti (not bootefi) so no EFI runtime is present.
          # grub-install --uefi-secure-boot calls efibootmgr which fails with exit 1
          # when /sys/firmware/efi does not exist. GRUB files install fine without it.
          find "$VYOS1X" -name '*.py' -exec \
            grep -l 'uefi.secure.boot' {} \; | \
            xargs -r sed -i "s/'--uefi-secure-boot'[,]\?//g" 2>/dev/null || true

          ### LS1046A console: revert ttyAMA0 -> ttyS0 (8250 UART at 0x21c0500)
          sed -i 's/ttyAMA0/ttyS0/g' \
            vyos-build/data/live-build-config/hooks/live/01-live-serial.binary \
            vyos-build/data/live-build-config/includes.chroot/opt/vyatta/etc/grub/default-union-grub-entry \
            2>/dev/null || true

          ### MOK certificate for kernel module signing
          if [ -f data/mok/MOK.key ]; then
            cp data/mok/MOK.key vyos-build/data/certificates/vyos-dev-2025-linux.key
            cp data/mok/MOK.pem vyos-build/data/certificates/vyos-dev-2025-linux.pem
          fi

          ### Minisign public key + DTB for ISO
          cp data/vyos-ls1046a.minisign.pub vyos-build/data/live-build-config/includes.chroot/usr/share/vyos/keys/
          mkdir -p vyos-build/data/live-build-config/includes.binary
          cp data/dtb/mono-gw.dtb vyos-build/data/live-build-config/includes.binary/mono-gw.dtb

          ### DTB inside squashfs: install_image() copies all files from /boot/
          # By placing the DTB at /boot/mono-gw.dtb inside the squashfs, VyOS's
          # install_image() automatically copies it to the target boot directory.
          # This requires ZERO changes to upstream image_installer.py.
          CHROOT=vyos-build/data/live-build-config/includes.chroot
          mkdir -p "$CHROOT/boot"
          cp data/dtb/mono-gw.dtb "$CHROOT/boot/mono-gw.dtb"

          ### U-Boot tools: fw_setenv config for updating boot env from Linux
          cp data/scripts/fw_env.config "$CHROOT/etc/fw_env.config"

          ### Post-install helper: copies DTB + updates U-Boot env after install/upgrade
          mkdir -p "$CHROOT/usr/local/bin"
          cp data/scripts/vyos-postinstall "$CHROOT/usr/local/bin/vyos-postinstall"
          chmod +x "$CHROOT/usr/local/bin/vyos-postinstall"

          ### Auto-run vyos-postinstall on every boot (ensures U-Boot env matches running image)
          # After 'install image' + first manual U-Boot boot, this service auto-saves the
          # correct env so all subsequent reboots are automatic. Also handles upgrades:
          # after 'add system image' + reboot, the service detects the running image and
          # updates U-Boot to match. No-op on non-LS1046A hardware (script exits early).
          printf '%s\n' \
            '[Unit]' \
            'Description=Sync U-Boot env with running VyOS image (LS1046A)' \
            'After=local-fs.target' \
            'ConditionPathExists=/proc/device-tree/compatible' \
            '' \
            '[Service]' \
            'Type=oneshot' \
            'ExecStart=/usr/local/bin/vyos-postinstall' \
            'RemainAfterExit=yes' \
            'StandardOutput=journal' \
            '' \
            '[Install]' \
            'WantedBy=multi-user.target' \
            > "$CHROOT/etc/systemd/system/vyos-postinstall.service"
          mkdir -p "$CHROOT/etc/systemd/system/multi-user.target.wants"
          ln -sf ../vyos-postinstall.service \
            "$CHROOT/etc/systemd/system/multi-user.target.wants/vyos-postinstall.service"

          ### Boot optimization: mask unnecessary services for LS1046A
          # kexec masking forces full cold reboot on installed systems, ensuring
          # DPAA1/SFP/I2C hardware re-initializes cleanly (kexec skips firmware).
          # IMPORTANT: ln -sf /dev/null in includes.chroot gets converted to empty
          # files by live-build (symlinks to absolute paths outside chroot are
          # dereferenced). We use a chroot hook to create proper symlinks instead.
          HOOKS=vyos-build/data/live-build-config/hooks/live
          cat > "$HOOKS/99-mask-services.chroot" << 'MASKHOOK'
          #!/bin/bash
          # Mask kexec services: prevents kexec preloading kernel at boot
          # (DPAA1/SFP/I2C needs full U-Boot re-init on reboot)
          # Both SysV init scripts AND systemd units must be masked
          ln -sf /dev/null /etc/systemd/system/kexec-load.service
          ln -sf /dev/null /etc/systemd/system/kexec.service
          # Remove SysV init scripts to prevent systemd-sysv-generator from
          # creating auto-generated units that bypass our systemd masks
          rm -f /etc/init.d/kexec-load /etc/init.d/kexec
          # ACPI daemon is useless on ARM64/DeviceTree platforms
          ln -sf /dev/null /etc/systemd/system/acpid.service
          ln -sf /dev/null /etc/systemd/system/acpid.socket
          ln -sf /dev/null /etc/systemd/system/acpid.path
          MASKHOOK
          chmod +x "$HOOKS/99-mask-services.chroot"

          ### Ethernet port remapping: match physical port order (left to right)
          # Mainline fsl_dpaa_mac probes in DT address order (e2000→e8000→ea000)
          # which gives rightmost RJ45 = eth0. Physical expectation: leftmost = eth0.
          #
          # VyOS uses its own naming system (vyos_net_name at 65-vyos-net.rules)
          # which overrides systemd .link files. The VyOS rule checks for
          # ENV{VYOS_IFNAME}: if set, it's passed as "predefined" name to
          # vyos_net_name, bypassing biosdevname. We set VYOS_IFNAME in a
          # priority-64 rule (before 65) using DEVPATH to identify FMan MACs.
          UDEVD="$CHROOT/etc/udev/rules.d"
          mkdir -p "$UDEVD"
          printf '%s\n' \
            '# Mono Gateway LS1046A: remap FMan ethernet ports to match physical RJ45 order' \
            '# DEVPATH contains the FMan MAC node address (always available, unlike ID_PATH)' \
            '# Sets VYOS_IFNAME which vyos_net_name (65-vyos-net.rules) honors as "predefined"' \
            'ACTION!="add", GOTO="fman_end"' \
            'SUBSYSTEM!="net", GOTO="fman_end"' \
            '# RJ45 ports (left to right facing the board)' \
            'ENV{DEVPATH}=="*/1ae8000.ethernet/*", ENV{VYOS_IFNAME}="eth0"' \
            'ENV{DEVPATH}=="*/1aea000.ethernet/*", ENV{VYOS_IFNAME}="eth1"' \
            'ENV{DEVPATH}=="*/1ae2000.ethernet/*", ENV{VYOS_IFNAME}="eth2"' \
            '# SFP+ ports (left to right)' \
            'ENV{DEVPATH}=="*/1af0000.ethernet/*", ENV{VYOS_IFNAME}="eth3"' \
            'ENV{DEVPATH}=="*/1af2000.ethernet/*", ENV{VYOS_IFNAME}="eth4"' \
            'LABEL="fman_end"' \
            > "$UDEVD/64-fman-port-order.rules"

      - name: Build Image Packages
        run: |
          cd vyos-build/scripts/package-build
          source <(sed -n '/enable programmable completion/,$p' /etc/skel/.bashrc)
          set -ex
          # packages=$(ls .)
          # packages="radvd vyos-1x linux-kernel"
          packages="linux-kernel vyos-1x"
          ignore_packages=(amazon-cloudwatch-agent amazon-ssm-agent xen-guest-agent)
          for package in $packages; do
            [ ! -d $package ] && continue
            [[ " ${ignore_packages[@]} " =~ " ${package} " ]] && continue
            cd $package

            [ $package == "keepalived" ] && apt-get install -y libsnmp-dev

            ./build.py

            [ $package == "keepalived" ] && apt-get remove -y libsnmp-dev

            ### Build Mono Gateway DTB from kernel source (before cleanup)
            if [ "$package" == "linux-kernel" ]; then
              KSRC=$(find . -maxdepth 1 -type d -name 'linux-*' | head -1)
              if [ -n "$KSRC" ] && [ -d "$KSRC/arch/arm64/boot/dts/freescale" ]; then
                echo "### Building Mono Gateway DTB from kernel source"
                # Copy our custom DTS into the kernel tree
                cp "$GITHUB_WORKSPACE/data/dtb/mono-gateway-dk.dts" \
                   "$KSRC/arch/arm64/boot/dts/freescale/mono-gateway-dk.dts"
                # Build it using the kernel's DTS infrastructure
                make -C "$KSRC" freescale/mono-gateway-dk.dtb 2>&1 | tail -10 || true
                MONO_DTB="$KSRC/arch/arm64/boot/dts/freescale/mono-gateway-dk.dtb"
                if [ -f "$MONO_DTB" ]; then
                  # Replace the SDK-extracted DTB with our mainline-compiled one
                  cp "$MONO_DTB" "$GITHUB_WORKSPACE/vyos-build/data/live-build-config/includes.binary/mono-gw.dtb"
                  # Also copy into squashfs (/boot/) so install_image() auto-copies it
                  cp "$MONO_DTB" "$GITHUB_WORKSPACE/vyos-build/data/live-build-config/includes.chroot/boot/mono-gw.dtb"
                  echo "### Mono Gateway DTB compiled: $(stat -c '%s bytes' "$MONO_DTB")"
                else
                  echo "WARNING: mono-gateway-dk.dtb build failed, keeping SDK DTB"
                  ls "$KSRC/arch/arm64/boot/dts/freescale/"*.dtb 2>/dev/null | head -5 || true
                fi
              fi
            fi

            # clean
            df -Th
            apt-get autoremove -y
            rm -rf $package *.gz *.xz $HOME/.cache/go-build $HOME/go/pkg/mod $HOME/.rustup
            df -Th
            cd ..
          done

      - name: Pick Packages
        run: |
          cd vyos-build
          source <(sed -n '/enable programmable completion/,$p' /etc/skel/.bashrc)
          deb_files=$(find scripts/package-build -name "*.deb" -type f | \
            grep -v -- -dbg | \
            grep -v -- -dev | \
            grep -v -- -doc
          )
          ignore_packages=(
            charon-cmd
            dropbear-initramfs
            dropbear-run
            eapoltest
            frr-test-tools
            isc-dhcp-client-ddns
            isc-dhcp-common
            isc-dhcp-keama
            isc-dhcp-server
            isc-dhcp-server-ldap
            libnetsnmptrapd40
            libsnmp-perl
            libtac2-bin
            libyang-modules
            libyang-tools
            # python3-nftables
            rtr-tools
            sflowovsd.deb
            snmptrapd
            strongswan-nm
            strongswan-pki
            tkmib
            waagent
            wide-dhcpv6-relay
            wide-dhcpv6-server
            vpp-plugin-devtools
            accel-ppp
          )
          for deb_file in $deb_files; do
            if [[ " ${ignore_packages[@]} " =~ " $(basename $deb_file | cut -d_ -f1) " ]]; then
              echo "ignore $deb_file"
              continue
            fi
            cp $deb_file packages
          done
          ls -alh packages

      - name: Archive Packages
        uses: actions/upload-artifact@v7
        with:
          name: vyos-packages
          path: vyos-build/packages/
          retention-days: 30
          compression-level: 0

      - name: Build VyOS ISO
        id: build_iso
        run: |
          cd vyos-build
          source <(sed -n '/enable programmable completion/,$p' /etc/skel/.bashrc)
          set -ex

          ### Copy mainline RDB DTB if built during kernel step
          if [ -f "$GITHUB_WORKSPACE/data/dtb/fsl-ls1046a-rdb.dtb" ]; then
            cp "$GITHUB_WORKSPACE/data/dtb/fsl-ls1046a-rdb.dtb" \
              data/live-build-config/includes.binary/fsl-ls1046a-rdb.dtb
            echo "### Mainline RDB DTB included in ISO"
          fi

          rm -rf packages/linux-headers-*

          ./build-vyos-image \
            --architecture arm64 \
            --build-by $BUILD_BY \
            --build-type release \
            --debian-mirror $DEBIAN_MIRROR \
            --debian-security-mirror $DEBIAN_SECURITY_MIRROR \
            --version ${{ steps.set_env_variables.outputs.build_version }} \
            --vyos-mirror $VYOS_MIRROR \
            --custom-package vim-tiny \
            --custom-package neofetch \
            --custom-package tree \
            --custom-package btop \
            --custom-package ripgrep \
            --custom-package wget \
            --custom-package ncdu \
            --custom-package fastnetmon \
            --custom-package containernetworking-plugins \
            --custom-package mokutil \
            --custom-package grub-efi-arm64-signed \
            --custom-package u-boot-tools \
            --custom-package libubootenv-tool \
            generic
          cd build
          # Rename generic -> LS1046A in artifact filenames
          ORIG_ISO=$(jq --raw-output .artifacts[0] manifest.json)
          IMAGE_ISO="${ORIG_ISO/generic/LS1046A}"
          IMAGE_NAME="${IMAGE_ISO%.iso}"
          mv "$ORIG_ISO" "$IMAGE_ISO"
          echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "image_iso=${IMAGE_ISO}" >> $GITHUB_OUTPUT
          # Cryptographically sign the image
          MINISIGN_PUBKEY_FILE=$GITHUB_WORKSPACE/data/vyos-ls1046a.minisign.pub
          MINISIGN_SECKEY_FILE=$GITHUB_WORKSPACE/data/vyos-ls1046a.minisign.key
          if [ -f "$MINISIGN_SECKEY_FILE" ]; then
            $GITHUB_WORKSPACE/bin/minisign -s $MINISIGN_SECKEY_FILE -Sm ${IMAGE_ISO}
            $GITHUB_WORKSPACE/bin/minisign -Vm ${IMAGE_ISO} -x ${IMAGE_ISO}.minisig -p $MINISIGN_PUBKEY_FILE
          else
            echo "fake sign" > ${IMAGE_ISO}.minisig
          fi
          # Move artifacts to workspace
          mv manifest.json ${IMAGE_ISO} ${IMAGE_ISO}.minisig $GITHUB_WORKSPACE

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build_iso.outputs.image_name }}
          path: |
            manifest.json
            ${{ steps.build_iso.outputs.image_iso }}
            ${{ steps.build_iso.outputs.image_iso }}.minisig
          retention-days: 15
          if-no-files-found: error
          compression-level: 0

  publish:
    needs:
      - build_iso
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    if: github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v6
      - name: Clone vyos-build repo
        uses: actions/checkout@v6
        with:
          repository: vyos/vyos-build
          path: vyos-build
          fetch-depth: 0
      - name: Clone vyos-1x source code
        uses: actions/checkout@v6
        with:
          repository: vyos/vyos-1x
          path: vyos-1x
          fetch-depth: 0
      - id: commit_ids
        name: Get commit IDs for changelog
        run: |
          set -ex
          cd vyos-build
          git log --since "${{ needs.build_iso.outputs.PREVIOUS_SUCCESS_BUILD_TIMESTAMP }}" --format="%H" --reverse
          CHANGELOG_COMMIT_VYOS_BUILD=$(git log --since "${{ needs.build_iso.outputs.PREVIOUS_SUCCESS_BUILD_TIMESTAMP }}" --format="%H" --reverse | head -n1)
          [ -z "$CHANGELOG_COMMIT_VYOS_BUILD" ] && CHANGELOG_COMMIT_VYOS_BUILD="HEAD"
          echo "CHANGELOG_COMMIT_VYOS_BUILD=${CHANGELOG_COMMIT_VYOS_BUILD}" >> $GITHUB_OUTPUT
          cd ../vyos-1x
          git log --since "${{ needs.build_iso.outputs.PREVIOUS_SUCCESS_BUILD_TIMESTAMP }}" --format="%H" --reverse
          CHANGELOG_COMMIT_VYOS_1X=$(git log --since "${{ needs.build_iso.outputs.PREVIOUS_SUCCESS_BUILD_TIMESTAMP }}" --format="%H" --reverse | head -n1)
          [ -z "$CHANGELOG_COMMIT_VYOS_1X" ] && CHANGELOG_COMMIT_VYOS_1X="HEAD"
          echo "CHANGELOG_COMMIT_VYOS_1X=${CHANGELOG_COMMIT_VYOS_1X}" >> $GITHUB_OUTPUT

      - name: "Release publishing: generate changelog for vyos-1x"
        id: generate_changelog_for_vyos-1x
        uses: mikepenz/release-changelog-builder-action@v6.1.1
        with:
          owner: "vyos"
          repo: "vyos-1x"
          fetchReviewers: false
          fromTag: ${{ steps.commit_ids.outputs.CHANGELOG_COMMIT_VYOS_1X }}
          toTag: HEAD
          configurationJson: |
            {
              "categories": [{"title": "", "labels": []}],
              "template": "#{{CHANGELOG}}",
              "pr_template": "- #{{TITLE}}\n   - PR: vyos/vyos-1x##{{NUMBER}}"
            }

      - name: "Release publishing: generate changelog for vyos-build"
        id: generate_changelog_for_vyos-build
        uses: mikepenz/release-changelog-builder-action@v6.1.1
        with:
          owner: "vyos"
          repo: "vyos-build"
          fetchReviewers: false
          fromTag: ${{ steps.commit_ids.outputs.CHANGELOG_COMMIT_VYOS_BUILD }}
          toTag: HEAD
          configurationJson: |
            {
              "categories": [{"title": "", "labels": []}],
              "template": "#{{CHANGELOG}}",
              "pr_template": "- #{{TITLE}}\n   - PR: vyos/vyos-build##{{NUMBER}}"
            }

      - name: "Release publishing: generate release notes"
        run: |
          cat <<EOF > /tmp/release_notes.md
          ## Upstream changes since last build

          ### vyos-1x
          ${{ steps.generate_changelog_for_vyos-1x.outputs.changelog }}
          ### vyos-build
          ${{ steps.generate_changelog_for_vyos-build.outputs.changelog }}
          EOF
          cat /tmp/release_notes.md

      - name: "Release publishing: create version.json"
        uses: jsdaniell/create-json@v1.2.3
        with:
          name: "version.json"
          json: |
            [
              {
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ needs.build_iso.outputs.build_version }}/${{ needs.build_iso.outputs.image_iso }}",
                "version": "${{ needs.build_iso.outputs.build_version }}",
                "timestamp": "${{ needs.build_iso.outputs.TIMESTAMP }}"
              }
            ]

      - name: "Release publishing: check if the repository was modified during runtime to prevent autocommit failure"
        id: check_if_the_repository_was_modified_during_runtime
        run: |
          sudo chown -R $(whoami):$(whoami) ./*
          # Save version.json (modified by create-json step), pull latest, restore
          cp version.json /tmp/version.json.new
          git checkout -- version.json 2>/dev/null || true
          git pull --rebase || true
          cp /tmp/version.json.new version.json

      - name: "Release publishing: create autocommit and tag"
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          tagging_message: ${{ needs.build_iso.outputs.build_version }}
          commit_message: ${{ needs.build_iso.outputs.build_version }}
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"

      - uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build_iso.outputs.image_name }}

      - uses: actions/download-artifact@v8
        with:
          name: vyos-packages
          path: packages
      - name: archive packages
        run: |
          set -ex
          tar -cvf vyos-packages.tar packages
          ls -alh vyos-packages.tar packages

      - name: "Release publishing: publish release"
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          tag_name: ${{ needs.build_iso.outputs.build_version }}
          fail_on_unmatched_files: false
          files: |
            ${{ needs.build_iso.outputs.image_iso }}
            ${{ needs.build_iso.outputs.image_iso }}.minisig
            vyos-packages.tar

      - uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 10
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
