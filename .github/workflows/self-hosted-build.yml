name: VyOS LS1046A build (self-hosted)

# Start Azure ARM64 VM → build on self-hosted runner → deallocate VM.
# VM costs ~$1.47/hr — always deallocated after build (even on failure).

on:
  workflow_dispatch:
    inputs:
      BUILD_BY:
        description: 'Builder identifier (auto: mihakralj@users.noreply.github.com)'
        default: ''
      build_version:
        description: 'Version number (auto: YYYY.MM.DD-HHMM-rolling)'
        default: ''
      builder_image:
        description: 'Builder Docker image'
        default: 'ghcr.io/huihuimoe/vyos-arm64-build/vyos-builder:current-arm64'

jobs:
  # ── Step 1: Power on the Azure ARM64 VM ──────────────────────────
  start-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Start VM
        run: |
          az vm start \
            --resource-group arm64-runner-group \
            --name arm64-runner

      - name: Wait for runner to register
        run: sleep 45

  # ── Step 2: Build VyOS on the self-hosted ARM64 runner ───────────
  call-auto-build:
    needs: start-vm
    uses: ./.github/workflows/auto-build.yml
    permissions:
      contents: write
    with:
      runs_on: ARM64
      BUILD_BY: ${{ github.event.inputs.BUILD_BY }}
      build_version: ${{ github.event.inputs.build_version }}
      builder_image: ${{ github.event.inputs.builder_image }}
    secrets:
      MOK_KEY: ${{ secrets.MOK_KEY }}
      MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}

  # ── Step 3: Deallocate VM to stop billing ────────────────────────
  stop-vm:
    needs: call-auto-build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deallocate VM
        run: |
          az vm deallocate \
            --resource-group arm64-runner-group \
            --name arm64-runner